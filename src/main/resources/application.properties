spring.application.name=shipping-calculator

# API key authentication. Each key is bound to one role; ADMIN inherits USER.
# Keys are supplied per environment via API_USER_KEY / API_ADMIN_KEY. With no
# value set the key is blank, so the app ships with no usable credentials rather
# than a known default (fail closed).
api.keys[0].key=${API_USER_KEY:}
api.keys[0].role=USER
api.keys[1].key=${API_ADMIN_KEY:}
api.keys[1].role=ADMIN
